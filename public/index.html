<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相机租赁系统</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">📷 相机租赁系统</h1>
            <div class="nav-menu">
                <a href="/" style="color:#2196F3;text-decoration:none;font-weight:600;">客户租赁</a>
                <a href="/admin.html" style="color:#2196F3;text-decoration:none;font-weight:600;">管理员</a>
            </div>
        </div>
    </nav>

    <!-- 客户页面 -->
    <div id="customerView" class="view">
        <!-- 设备浏览页面 -->
        <div id="equipmentViewPage" class="page-view">
            <div class="container">
                <!-- 设备列表区域 -->
                <div class="equipment-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>可租设备</h2>
                        <button id="viewCartBtn" class="btn-primary" onclick="switchCustomerPage('cart')">📋 查看购物车 <span id="cartBadge" style="display: none; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 5px;">0</span></button>
                    </div>
                    
                    <!-- 筛选器 -->
                    <div class="filters">
                        <select id="categoryFilter" onchange="applyFilters()">
                            <option value="">所有种类</option>
                        </select>
                        <select id="brandFilter" onchange="applyFilters()">
                            <option value="">所有品牌</option>
                        </select>
                        <select id="locationFilter" onchange="applyFilters()">
                            <option value="">所有地址</option>
                            <option value="北京">北京</option>
                            <option value="成都">成都</option>
                        </select>
                        <input type="number" id="minPriceFilter" placeholder="最低日租价" onchange="applyFilters()">
                        <input type="number" id="maxPriceFilter" placeholder="最高日租价" onchange="applyFilters()">
                    </div>

                    <!-- 设备列表 -->
                    <div id="equipmentList" class="equipment-grid">
                        <p class="loading">加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 购物车与订单页面 -->
        <div id="cartViewPage" class="page-view" style="display: none;">
            <div class="container">
                <button class="btn-secondary" onclick="switchCustomerPage('equipment')" style="margin-bottom: 20px;">← 返回设备列表</button>
                
                <h2>购物车与订单</h2>
                
                <!-- 购物车列表 -->
                <div class="cart-section">
                    <h3>购物车（已选设备）</h3>
                    <div id="cartItems" class="cart-items-container">
                        <p class="empty-cart">购物车为空</p>
                    </div>
                </div>

                <!-- 提交订单表单 -->
                <div id="checkoutSection" class="checkout-section" style="display:none;">
                    <h3>提交订单</h3>
                    <form id="rentalForm" class="rental-form">
                        <h4>订单类型</h4>
                        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="transactionType" value="shipping" checked onchange="updateOrderTypeFields()"> 邮寄
                            </label>
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="transactionType" value="pickup" onchange="updateOrderTypeFields()"> 自提
                            </label>
                        </div>

                        <h4>客户信息</h4>
                        <input type="text" id="customerName" placeholder="姓名 *" required>
                        <input type="tel" id="customerPhone" placeholder="联系方式">
                        <input type="text" id="customerNickname" placeholder="昵称">

                        <div id="shippingSection">
                            <h4>收货地址（选填）</h4>
                            <textarea id="deliveryAddress" placeholder="收货地址"></textarea>
                            <h4>寄回地址（选填，若不填则使用收货地址）</h4>
                            <textarea id="returnAddress" placeholder="寄回地址"></textarea>
                        </div>

                        <div id="pickupSection" style="display: none;">
                            <h4>自提时间 *</h4>
                            <input type="datetime-local" id="pickupTime" required>
                            <h4>设备归还时间 *</h4>
                            <input type="datetime-local" id="returnPickupTime" required>
                        </div>

                        <div class="order-summary">
                            <div id="totalPriceInfo" class="price-info">总租金: ¥0.00</div>
                        </div>

                        <button type="submit" class="btn-primary btn-large">提交订单</button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- 成功提示模态框 -->
    <div id="successModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>✓ 订单提交成功</h2>
            <div id="transactionCodeDisplay"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="copyAllTransactionCodes()" style="flex: 1; background-color: #2196F3;">📋 一键复制所有交易码</button>
                <button class="btn-primary" onclick="closeModal()" style="flex: 1;">关闭</button>
            </div>
        </div>
    </div>



    <script src="/script.js"></script>
</body>
</html>
