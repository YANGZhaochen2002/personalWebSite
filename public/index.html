<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">🔐</div>
            <h1>登录系统</h1>
            
            <!-- 选项卡 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="form active">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input 
                        type="text" 
                        id="loginUsername" 
                        name="username" 
                        placeholder="输入用户名" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        name="password" 
                        placeholder="输入密码" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">登录</button>
                <div id="loginError" class="error-message"></div>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="form">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input 
                        type="text" 
                        id="registerUsername" 
                        name="username" 
                        placeholder="输入用户名（至少3个字符）" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input 
                        type="password" 
                        id="registerPassword" 
                        name="password" 
                        placeholder="输入密码（至少6个字符）" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="registerPassword2">确认密码</label>
                    <input 
                        type="password" 
                        id="registerPassword2" 
                        name="confirmPassword" 
                        placeholder="再次输入密码" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">注册</button>
                <div id="registerError" class="error-message"></div>
            </form>
        </div>

        <!-- 用户面板（登录后显示） -->
        <div id="userPanel" class="user-panel" style="display: none;">
            <div class="panel-header">
                <h2>欢迎！</h2>
                <button id="logoutBtn" class="btn btn-secondary">登出</button>
            </div>
            <div class="panel-content">
                <p><strong>用户ID:</strong> <span id="userId"></span></p>
                <p><strong>用户名:</strong> <span id="displayUsername"></span></p>
                <p><strong>注册时间:</strong> <span id="createdAt"></span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
